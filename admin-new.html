<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المطور — متجري</title>
<style>
  body{font-family:'Segoe UI','Arial',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px;box-sizing:border-box;}
  .box{background:#1a1d27;border:1px solid #2e3348;border-radius:14px;padding:28px;width:500px;max-width:100%;}
  h1{color:#f5a623;font-size:1.3rem;margin-bottom:4px;text-align:center;}
  p{color:#8b90a4;font-size:0.83rem;text-align:center;margin-bottom:20px;}
  label{font-size:0.8rem;color:#8b90a4;font-weight:600;display:block;margin-bottom:4px;}
  input{width:100%;background:#0f1117;border:1px solid #2e3348;border-radius:8px;color:#e8eaf0;padding:9px 12px;font-family:'Segoe UI','Arial',sans-serif;font-size:0.9rem;margin-bottom:12px;box-sizing:border-box;}
  input:focus{outline:none;border-color:#f5a623;}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-family:'Segoe UI','Arial',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;}
  .btn-primary{background:#f5a623;color:#000;width:100%;}
  .btn-green{background:#27ae60;color:#fff;}
  .btn-red{background:#e74c3c;color:#fff;font-size:0.78rem;padding:5px 10px;}
  .hr{border:none;border-top:1px solid #2e3348;margin:18px 0;}
  .result{background:#0f1117;border-radius:8px;padding:14px;margin-top:14px;display:none;}
  .code-big{font-size:1.6rem;font-weight:800;letter-spacing:3px;color:#f5a623;text-align:center;margin:8px 0;}
  .line-box{background:#1a1d27;border:1px solid #2e3348;border-radius:6px;padding:8px 10px;font-size:0.75rem;color:#f5a623;font-family:monospace;word-break:break-all;margin-top:8px;}
  .client-item{background:#0f1117;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .badge{padding:3px 8px;border-radius:12px;font-size:0.72rem;font-weight:700;}
  .badge-active{background:#1a3a28;color:#27ae60;}
  .badge-pending{background:#3a2a0a;color:#f5a623;}
  .login-box{text-align:center;}
  .err{color:#e74c3c;font-size:0.83rem;margin-bottom:10px;display:none;}
</style>
</head>
<body>
<div class="box">

  <!-- LOGIN -->
  <div id="login-section" class="login-box">
    <div style="font-size:2rem;margin-bottom:8px;">🔐</div>
    <h1>لوحة المطور</h1>
    <p>متجري | My Shop</p>
    <input type="password" id="login-input" placeholder="كلمة سر المطور...">
    <div id="login-err" class="err">كلمة السر غير صحيحة</div>
    <button class="btn btn-primary" onclick="doLogin()">دخول</button>
  </div>

  <!-- PANEL -->
  <div id="panel-section" style="display:none;">
    <h1>لوحة المطور — متجري</h1>
    <p>إضافة زبائن وتوليد أكواد التفعيل</p>
    <hr class="hr">

    <!-- Add client -->
    <label>اسم المحل</label>
    <input type="text" id="shop-name" placeholder="مثال: محل أبو أحمد">
    <label>كلمة السر المؤقتة (ترسلها للزبون)</label>
    <input type="text" id="temp-pass" placeholder="مثال: 1234 أو أي كلمة">
    <button class="btn btn-primary" onclick="addClient()">➕ إضافة زبون وتوليد كود</button>

    <!-- Result -->
    <div class="result" id="result">
      <div style="color:#8b90a4;font-size:0.8rem;text-align:center;">كود التفعيل لـ <span id="res-name" style="color:#f5a623;"></span></div>
      <div class="code-big" id="res-code"></div>
      <div style="text-align:center;margin-bottom:8px;">
        <button class="btn btn-green" onclick="copyAll()">📋 نسخ الرسالة الكاملة</button>
      </div>
      <div id="res-msg" class="line-box"></div>
    </div>

    <hr class="hr">

    <!-- Clients list -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-weight:700;font-size:0.9rem;">الزبائن المسجلين</span>
      <button class="btn btn-green" onclick="loadClients()" style="font-size:0.78rem;padding:5px 10px;">🔄 تحديث</button>
    </div>
    <div id="clients-list"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://nrslrrtwwarxlqxzkdiw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Ux5ToNZqLCmffMb1ZB7QNw_widJvOAy';
const ADMIN_PASS = 'Adminkonto2026';
const SITE_URL = 'https://my-shop-six-amber.vercel.app'; // رابط Vercel

document.getElementById('login-input').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function doLogin(){
  const pass = document.getElementById('login-input').value.trim();
  if(pass === ADMIN_PASS){
    document.getElementById('login-section').style.display='none';
    document.getElementById('panel-section').style.display='block';
    loadClients();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-input').value='';
  }
}

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++) code+=chars[Math.floor(Math.random()*chars.length)];
    if(i<3) code+='-';
  }
  return code;
}

async function addClient(){
  const name = document.getElementById('shop-name').value.trim();
  const tempPass = document.getElementById('temp-pass').value.trim();
  if(!name || !tempPass){ alert('الرجاء إدخال اسم المحل وكلمة السر المؤقتة'); return; }

  const code = genCode();

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({shop_name: name, code, temp_password: tempPass, activated: false})
    });

    if(!res.ok){ const e=await res.text(); alert('خطأ: '+e); return; }

    const msg = `مرحباً! 🏪\nبرنامج متجري | My Shop جاهز لك\n\nرابط التفعيل:\n${SITE_URL}\n\nكود التفعيل: ${code}\nكلمة السر المؤقتة: ${tempPass}\n\nافتح الرابط وأدخل الكود وكلمة السر ثم حدد كلمة سرك الخاصة`;

    document.getElementById('res-name').textContent = name;
    document.getElementById('res-code').textContent = code;
    document.getElementById('res-msg').textContent = msg;
    document.getElementById('result').style.display='block';

    document.getElementById('shop-name').value='';
    document.getElementById('temp-pass').value='';
    loadClients();
  } catch(e){ alert('خطأ في الاتصال: '+e.message); }
}

function copyAll(){
  const msg = document.getElementById('res-msg').textContent;
  navigator.clipboard.writeText(msg).then(()=>alert('تم نسخ الرسالة — أرسلها للزبون'));
}

async function loadClients(){
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?order=created_at.desc`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
    });
    const data = await res.json();
    const list = document.getElementById('clients-list');
    if(!data.length){ list.innerHTML='<div style="color:#8b90a4;font-size:0.85rem;text-align:center;padding:16px;">لا يوجد زبائن بعد</div>'; return; }
    list.innerHTML = data.map(c=>`
      <div class="client-item">
        <div>
          <div style="font-weight:700;">${c.shop_name}</div>
          <div style="color:#f5a623;font-size:0.8rem;letter-spacing:1px;">${c.code}</div>
          <div style="color:#8b90a4;font-size:0.75rem;">${new Date(c.created_at).toLocaleDateString('ar-SY')}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="badge ${c.activated?'badge-active':'badge-pending'}">${c.activated?'مفعّل':'بانتظار'}</span>
          <button class="btn btn-red" onclick="deleteClient('${c.id}')">🗑</button>
        </div>
      </div>
    `).join('');
  } catch(e){ document.getElementById('clients-list').innerHTML='<div style="color:#e74c3c;">خطأ في التحميل</div>'; }
}

async function deleteClient(id){
  if(!confirm('هل تريد حذف هذا الزبون؟')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${id}`, {
    method: 'DELETE',
    headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
  });
  loadClients();
}
</script>
</body>
</html>
