<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري | My Shop — تفعيل</title>
<style>
  body{font-family:'Segoe UI','Arial',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;}
  .box{background:#1a1d27;border:1px solid #2e3348;border-radius:14px;padding:32px;width:400px;max-width:95vw;text-align:center;}
  h1{color:#f5a623;font-size:1.4rem;margin-bottom:6px;}
  p{color:#8b90a4;font-size:0.85rem;margin-bottom:24px;}
  label{font-size:0.82rem;color:#8b90a4;font-weight:600;display:block;text-align:right;margin-bottom:5px;}
  input{width:100%;background:#0f1117;border:1px solid #2e3348;border-radius:8px;color:#e8eaf0;padding:10px 12px;font-family:'Segoe UI','Arial',sans-serif;font-size:0.95rem;margin-bottom:14px;box-sizing:border-box;}
  input:focus{outline:none;border-color:#f5a623;}
  .btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:'Segoe UI','Arial',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;background:#f5a623;color:#000;}
  .btn:hover{background:#e67e22;}
  .err{color:#e74c3c;font-size:0.85rem;margin-bottom:12px;padding:8px;background:#3a1a1a;border-radius:8px;display:none;}
  .success{color:#27ae60;font-size:0.85rem;margin-bottom:12px;padding:8px;background:#1a3a28;border-radius:8px;display:none;}
  .step{display:none;}
  .step.active{display:block;}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:2.5rem;margin-bottom:10px;">🏪</div>
  <h1>متجري | My Shop</h1>

  <!-- Step 1: Enter code + temp password -->
  <div class="step active" id="step1">
    <p>أدخل كود التفعيل وكلمة السر المؤقتة</p>
    <div style="text-align:right;">
      <label>كود التفعيل</label>
      <input type="text" id="code-input" placeholder="مثال: ABCD-EFGH-IJKL-MNOP">
      <label>كلمة السر المؤقتة</label>
      <input type="password" id="temp-pass-input" placeholder="كلمة السر المؤقتة">
    </div>
    <div id="step1-err" class="err"></div>
    <button class="btn" onclick="verifyCode()">التحقق من الكود</button>
  </div>

  <!-- Step 2: Set new password -->
  <div class="step" id="step2">
    <p id="welcome-msg"></p>
    <div style="text-align:right;">
      <label>كلمة السر الجديدة</label>
      <input type="password" id="new-pass" placeholder="4 أحرف على الأقل">
      <label>تأكيد كلمة السر</label>
      <input type="password" id="new-pass-confirm" placeholder="تأكيد كلمة السر">
    </div>
    <div id="step2-err" class="err"></div>
    <button class="btn" onclick="setPassword()">تأكيد وتنزيل البرنامج</button>
  </div>

  <!-- Step 3: Download -->
  <div class="step" id="step3">
    <div style="font-size:2rem;margin-bottom:10px;">✅</div>
    <p style="color:#27ae60;font-size:1rem;font-weight:700;">تم التفعيل بنجاح!</p>
    <p>الآن نزّل البرنامج واحفظه على جهازك</p>
    <button class="btn" onclick="downloadApp()" style="margin-bottom:12px;">⬇ تنزيل متجري</button>
    <p style="font-size:0.78rem;color:#8b90a4;">افتح الملف بـ Chrome وادخل بكلمة سرك الجديدة</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nrslrrtwwarxlqxzkdiw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Ux5ToNZqLCmffMb1ZB7QNw_widJvOAy';

let activatedClient = null;

async function verifyCode(){
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const tempPass = document.getElementById('temp-pass-input').value.trim();
  const errEl = document.getElementById('step1-err');

  if(!code || !tempPass){ errEl.textContent='الرجاء إدخال الكود وكلمة السر'; errEl.style.display='block'; return; }

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?code=eq.${code}&temp_password=eq.${tempPass}&activated=eq.false`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`}
    });
    const data = await res.json();
    if(!data.length){ errEl.textContent='❌ الكود غير صحيح أو تم استخدامه مسبقاً'; errEl.style.display='block'; return; }
    activatedClient = data[0];
    document.getElementById('welcome-msg').textContent = `مرحباً بك في ${activatedClient.shop_name}! حدد كلمة سر جديدة`;
    errEl.style.display='none';
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
  } catch(e){ errEl.textContent='خطأ في الاتصال — تحقق من الإنترنت'; errEl.style.display='block'; }
}

async function setPassword(){
  const pass = document.getElementById('new-pass').value;
  const confirm = document.getElementById('new-pass-confirm').value;
  const errEl = document.getElementById('step2-err');

  if(pass.length < 4){ errEl.textContent='كلمة السر يجب أن تكون 4 أحرف على الأقل'; errEl.style.display='block'; return; }
  if(pass !== confirm){ errEl.textContent='كلمتا السر غير متطابقتين'; errEl.style.display='block'; return; }

  try {
    // Mark as activated
    await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${activatedClient.id}`, {
      method: 'PATCH',
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json'},
      body: JSON.stringify({activated: true})
    });

    // Save to localStorage for the app
    localStorage.setItem('myshop_code', activatedClient.code);
    localStorage.setItem('myshop_pass', btoa(pass));
    localStorage.setItem('myshop_name', activatedClient.shop_name);

    errEl.style.display='none';
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
  } catch(e){ errEl.textContent='خطأ — حاول مرة ثانية'; errEl.style.display='block'; }
}

function downloadApp(){
  window.location.href = '/mutajari.html';
}
</script>
</body>
</html>
